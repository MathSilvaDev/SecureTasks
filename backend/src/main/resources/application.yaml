spring:
  application:
    name: secureList

  datasource:
    url: jdbc:postgresql://localhost:5432/securelist
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    jwt:
      private-key: classpath:keys/jwt-private.key
      public-key: classpath:keys/jwt-public.key

server:
  address: 0.0.0.0
  port: 8080