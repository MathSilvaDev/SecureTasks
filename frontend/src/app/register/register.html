<div class="container">
  <form class="form">
    <h2>Register</h2>

    <input 
      type="text" 
      name="username"
      placeholder="Username"
      required 
    >
    <input 
      type="email" 
      name="email"
      placeholder="Email"
      required
    >
    <input 
      type="password" 
      name="password"
      placeholder="Password"
      required 
    >

    <button type="submit">Create Account</button>

    <p>Already have an account? 
      <a [routerLink]="['/login']">Login</a>
    </p>
  </form>
</div>
