<div class="container">
  <div class="form">
    <h2>My Tasks</h2>

    <input 
      type="text"
      name="title"
      placeholder="Title"
      required
      [(ngModel)]="title"
    >
    <input 
      type="text" 
      name="description"
      placeholder="Description" 
      required
      [(ngModel)]="description"
    >

    <button>Add Task</button>

    <div class="tasks">
      @for (item of listItems; track $index) {
        <div class="task">
          <div class="task-header">
            <h3>{{ item.title }}</h3>
            <input type="checkbox">
          </div>

          <p>{{ item.description }}</p>
          <span>Created at: <b>{{ item.createdAt }}</b></span>
        </div>
      }
    </div>
    
  </div>
</div>
