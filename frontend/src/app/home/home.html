<div class="container">
  <form (ngSubmit)="createTask()" class="form">
    <h2>My Tasks</h2>

    <input 
      type="text"
      name="title"
      placeholder="Title"
      required
      [(ngModel)]="title"
    >
    <input 
      type="text" 
      name="description"
      placeholder="Description" 
      required
      [(ngModel)]="description"
    >

    <button type="submit">Add Task</button>
    
    <div class="tasks">
      @for (item of listItems; track $index) {
        <div class="task">
          <button 
            type="button" 
            class="delete-btn" 
            (click)="deleteTask(item.id)">
            x
          </button>
          <div class="task-header">
            <h3>{{ item.title }}</h3>
            <input
              type="checkbox"
              name="isCompleted"
              (change)="completeTask(item.id)"
              [checked]="item.isCompleted"
            >
          </div>
            
          <p>{{ item.description }}</p>
          <span>Created at: <b>{{ item.createdAt }}</b></span>
        </div>
      }
    </div>
    
  </form>
</div>
