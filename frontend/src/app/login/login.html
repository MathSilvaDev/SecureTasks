<div class="container">
  <form (ngSubmit)="login()" class="form">
    <h2>Login</h2>

    <input 
      type="email" 
      name="email"
      placeholder="Email" 
      required
      [(ngModel)]="email"
    >
    <input 
      type="password" 
      name="password"
      placeholder="Password" 
      required
      [(ngModel)]="password"
    >

    <button type="submit">Sign In</button>

    <p>Don't have an account?
      <a [routerLink]="['/register']">Register</a>
    </p>
  </form>
</div>
